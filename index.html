<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Curonex | Camp Booking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ==========================================================
     STATIC — TOP NAVBAR (copy as-is onto every page)
     ========================================================== -->
<header class="navbar">
  <div class="navbar-brand">
    <div class="logo-slot">
      <!-- Drop your PNG path here — it will scale to fit this 44x44 slot -->
      <img src="curonex-logo.png" alt="Curonex logo" onerror="this.style.display='none'">
    </div>
    <div class="brand-text-group">
      <span class="brand-title">Curonex</span>
      <span class="brand-tagline">Affordable Healthcare Access</span>
    </div>
  </div>

  <div class="navbar-right">
    <nav class="nav-links">
      <a class="nav-link" href="#">About</a>
      <a class="nav-link" href="#">Contact</a>
    </nav>

    <button class="icon-btn-round" aria-label="Notifications">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M9 2.5C6.5 2.5 4.5 4.5 4.5 7V10L3 13H15L13.5 10V7C13.5 4.5 11.5 2.5 9 2.5Z" stroke="#FFFFFF" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M7.3 15C7.6 15.7 8.25 16.2 9 16.2C9.75 16.2 10.4 15.7 10.7 15" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <span class="badge">2</span>
    </button>

    <div class="user-menu">
      <button class="user-trigger" id="userTrigger" aria-haspopup="true" aria-expanded="false">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="6" r="3" stroke="#FFFFFF" stroke-width="1.4"/>
          <path d="M3.5 15C4.3 12.3 6.4 11 9 11C11.6 11 13.7 12.3 14.5 15" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
        Kaushik T
        <svg class="chevron" width="12" height="8" viewBox="0 0 12 8" fill="none">
          <path d="M1 1.5L6 6.5L11 1.5" stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="user-dropdown" id="userDropdown">
        <button class="dropdown-item">My Profile</button>
        <button class="dropdown-item">Settings</button>
        <button class="dropdown-item logout" id="logoutBtn">Logout</button>
      </div>
    </div>
  </div>
</header>

<div class="app-layout">

  <!-- ==========================================================
       STATIC — LEFT SIDEBAR (copy as-is onto every page,
       just move the "active" class to the current page's link)
       ========================================================== -->
  <aside class="sidebar">
    <nav class="sidebar-nav">
      <a class="sidebar-link" href="#">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="2.5" y="4" width="15" height="13" rx="2" stroke="#4B5563" stroke-width="1.4"/>
          <path d="M2.5 8H17.5" stroke="#4B5563" stroke-width="1.4"/>
          <path d="M6 2.3V5.5M14 2.3V5.5" stroke="#4B5563" stroke-width="1.4" stroke-linecap="round"/>
          <circle cx="10" cy="12.3" r="1.6" stroke="#4B5563" stroke-width="1.2"/>
        </svg>
        Appointment Scheduling
      </a>
      <a class="sidebar-link" href="#">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="3" y="8" width="14" height="9" rx="1.4" stroke="#4B5563" stroke-width="1.4"/>
          <path d="M6 8V4.5C6 3.4 6.9 2.5 8 2.5H12C13.1 2.5 14 3.4 14 4.5V8" stroke="#4B5563" stroke-width="1.4"/>
          <path d="M8.3 12.3H11.7M10 10.7V14" stroke="#4B5563" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        Pharmacy
      </a>
      <a class="sidebar-link" href="#">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M2.5 12.5H4.5L6.2 9L8.2 15L10 6L11.5 12.5H17.5" stroke="#4B5563" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Emergency Service
      </a>
      <a class="sidebar-link" href="#">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2.5C10 2.5 5 8.3 5 12C5 14.8 7.2 17 10 17C12.8 17 15 14.8 15 12C15 8.3 10 2.5 10 2.5Z" stroke="#4B5563" stroke-width="1.4" stroke-linejoin="round"/>
        </svg>
        Critical Resource Service
      </a>
      <a class="sidebar-link active" href="#">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M3 17V9L10 4L17 9V17" stroke="#1976D2" stroke-width="1.4" stroke-linejoin="round"/>
          <path d="M7.5 17V12.5H12.5V17" stroke="#1976D2" stroke-width="1.4" stroke-linejoin="round"/>
          <path d="M10 6.5V9M8.7 7.7H11.3" stroke="#1976D2" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        Medical Camp
      </a>
    </nav>
  </aside>

  <!-- ==========================================================
       PAGE BODY — Camp Booking content only. This is the part
       that changes from page to page; navbar + sidebar above
       stay identical everywhere.
       ========================================================== -->
  <main class="page-content">
    <h1 class="page-title">Camp Booking</h1>
    <p class="page-subtitle">Find and book a slot at a medical camp near you.</p>

    <section class="search-card">
      <div class="search-row">
        <div class="search-input-wrap">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <circle cx="8" cy="8" r="6" stroke="#6B7280" stroke-width="1.6"/>
            <path d="M12.5 12.5L16 16" stroke="#6B7280" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Search camp by ID, name, city, or specialization">
        </div>
        <button class="btn btn-primary" id="searchBtn">Search</button>
        <button class="filter-toggle" id="filterToggle" type="button" aria-expanded="false">
          Filters
          <svg width="12" height="8" viewBox="0 0 12 8" fill="none" id="filterChevron">
            <path d="M1 1.5L6 6.5L11 1.5" stroke="#1976D2" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <!-- Advanced filters (radius filter removed) -->
      <div class="filters-panel" id="filtersPanel">
        <div class="form-group">
          <label for="specializationFilter">Specialization</label>
          <select id="specializationFilter" class="select-input">
            <option value="">All specializations</option>
            <option>General Medicine</option>
            <option>Cardiology</option>
            <option>Dermatology</option>
            <option>Pediatrics</option>
            <option>Orthopedics</option>
            <option>Ophthalmology</option>
            <option>Dental</option>
          </select>
        </div>

        <div class="form-group">
          <label for="cityFilter">City</label>
          <input type="text" id="cityFilter" class="text-input" placeholder="Enter city">
        </div>

        <div class="filters-actions">
          <button class="btn btn-secondary" id="clearFiltersBtn" type="button">Clear filters</button>
          <button class="btn btn-primary" id="applyFiltersBtn" type="button">Apply filters</button>
        </div>
      </div>
    </section>

    <section class="results-section">
      <div class="results-heading-row">
        <h2 class="section-heading" id="resultsHeading">Latest camps</h2>
      </div>

      <div class="camp-grid" id="campGrid"></div>

      <div class="empty-state" id="emptyState" hidden>
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
          <circle cx="28" cy="28" r="18" stroke="#C9DDF2" stroke-width="3"/>
          <path d="M41 41L54 54" stroke="#C9DDF2" stroke-width="3" stroke-linecap="round"/>
          <path d="M22 28H34" stroke="#C9DDF2" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <h3>No camp found</h3>
        <p>Try a different camp ID, name, city, or specialization.</p>
      </div>

      <nav class="pagination" id="pagination" aria-label="Camp results pages"></nav>
    </section>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
