<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curonex | Camp Booking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ TOP NAVBAR ============ -->
<header class="navbar">
  <div class="navbar-inner">
    <div class="navbar-left">
      <a class="logo" href="#" aria-label="Curonex home">
        <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 20.5C9 15.8056 12.8056 12 17.5 12C22.1944 12 26 15.8056 26 20.5" stroke="url(#logoGrad)" stroke-width="2.1" stroke-linecap="round"/>
          <path d="M9 20.5V16.2C9 15.0954 9.89543 14.2 11 14.2C12.1046 14.2 13 15.0954 13 16.2V17.6" stroke="url(#logoGrad)" stroke-width="2.1" stroke-linecap="round"/>
          <circle cx="26" cy="21.5" r="2" fill="#64B5F6"/>
          <rect x="12.5" y="7" width="9" height="16" rx="2.4" fill="url(#logoCross)"/>
          <rect x="7.5" y="12" width="19" height="6.5" rx="2.4" fill="url(#logoCross)"/>
          <defs>
            <linearGradient id="logoGrad" x1="9" y1="12" x2="26" y2="20.5" gradientUnits="userSpaceOnUse">
              <stop stop-color="#1976D2"/><stop offset="1" stop-color="#64B5F6"/>
            </linearGradient>
            <linearGradient id="logoCross" x1="7.5" y1="7" x2="26" y2="23" gradientUnits="userSpaceOnUse">
              <stop stop-color="#64B5F6"/><stop offset="1" stop-color="#1976D2"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="logo-text">Curonex</span>
      </a>
    </div>

    <div class="navbar-right">
      <button class="icon-btn profile-btn" id="profileBtn" aria-label="Profile" aria-haspopup="true">
        <span class="avatar">RS</span>
      </button>

      <div class="menu-wrapper">
        <button class="icon-btn menu-btn" id="menuBtn" aria-label="Open menu" aria-haspopup="true" aria-expanded="false">
          <svg width="20" height="16" viewBox="0 0 20 16" fill="none">
            <rect width="20" height="2.2" rx="1.1" fill="#FFFFFF"/>
            <rect y="6.9" width="20" height="2.2" rx="1.1" fill="#FFFFFF"/>
            <rect y="13.8" width="20" height="2.2" rx="1.1" fill="#FFFFFF"/>
          </svg>
        </button>
        <div class="dropdown-menu" id="dropdownMenu">
          <button class="dropdown-item logout-item" id="logoutBtn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M6 2H3.5C2.67 2 2 2.67 2 3.5V12.5C2 13.33 2.67 14 3.5 14H6" stroke="#D32F2F" stroke-width="1.4" stroke-linecap="round"/>
              <path d="M10.5 11L14 8L10.5 5" stroke="#D32F2F" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M14 8H6" stroke="#D32F2F" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            Logout
          </button>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- ============ MAIN ============ -->
<main class="main-container">

  <!-- Page heading row -->
  <div class="page-header">
    <button class="back-btn" id="backBtn" aria-label="Go back">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M12.5 4.5L6 10L12.5 15.5" stroke="#0B3D91" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1 class="page-title">Camp Booking</h1>
  </div>

  <!-- Search card -->
  <section class="search-card">
    <div class="search-row">
      <div class="search-input-wrap">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="8" cy="8" r="6" stroke="#6B7280" stroke-width="1.6"/>
          <path d="M12.5 12.5L16 16" stroke="#6B7280" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search camp by ID, name, city, or specialization">
      </div>
      <button class="btn btn-primary" id="searchBtn">Search</button>
      <button class="filter-toggle" id="filterToggle" type="button" aria-expanded="false">
        Filters
        <svg width="12" height="8" viewBox="0 0 12 8" fill="none" id="filterChevron">
          <path d="M1 1.5L6 6.5L11 1.5" stroke="#1976D2" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- Advanced filters (collapsible) -->
    <div class="filters-panel" id="filtersPanel">
      <div class="form-group">
        <label for="specializationFilter">Specialization</label>
        <select id="specializationFilter" class="select-input">
          <option value="">All specializations</option>
          <option>General Medicine</option>
          <option>Cardiology</option>
          <option>Dermatology</option>
          <option>Pediatrics</option>
          <option>Orthopedics</option>
          <option>Ophthalmology</option>
          <option>Dental</option>
        </select>
      </div>

      <div class="form-group">
        <label for="cityFilter">City</label>
        <input type="text" id="cityFilter" class="text-input" placeholder="Enter city">
      </div>

      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="radiusToggle">
          Limit to search radius
        </label>
        <div class="radius-field" id="radiusField">
          <label for="radiusInput">
            Search radius (km) <span class="required">*</span>
          </label>
          <input type="number" id="radiusInput" class="text-input" placeholder="e.g. 10" min="0" step="0.5" disabled>
          <p class="error-text" id="radiusError">Enter a valid search radius</p>
        </div>
      </div>

      <div class="filters-actions">
        <button class="btn btn-secondary" id="clearFiltersBtn" type="button">Clear filters</button>
        <button class="btn btn-primary" id="applyFiltersBtn" type="button">Apply filters</button>
      </div>
    </div>
  </section>

  <!-- Results -->
  <section class="results-section">
    <div class="results-heading-row">
      <h2 class="section-heading" id="resultsHeading">Latest camps</h2>
      <span class="results-count" id="resultsCount"></span>
    </div>

    <div class="camp-grid" id="campGrid"></div>

    <div class="empty-state" id="emptyState" hidden>
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <circle cx="28" cy="28" r="18" stroke="#C9DDF2" stroke-width="3"/>
        <path d="M41 41L54 54" stroke="#C9DDF2" stroke-width="3" stroke-linecap="round"/>
        <path d="M22 28H34" stroke="#C9DDF2" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <h3>No camp found</h3>
      <p>Try a different camp ID, name, city, or specialization.</p>
    </div>

    <!-- Pagination -->
    <nav class="pagination" id="pagination" aria-label="Camp results pages"></nav>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
